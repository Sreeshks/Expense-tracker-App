name: zybo
description: "Zybo - Personal Expense Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  shared_preferences: ^2.3.5
  google_fonts: ^6.2.1
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.1
  http: ^1.3.0
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  google_nav_bar: ^5.0.7
  pinput: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
